# Release desktop builds to GitHub Releases.
#
# Usage:
#   git tag v1.0.0
#   git push origin v1.0.0
#
# Each platform runner uploads installers and latest*.yml metadata.
# Installed apps use electron-updater to fetch updates from the release.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          export VERSION
          node -e "
            const fs = require('fs');
            const path = 'apps/desktop/package.json';
            const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
            pkg.version = process.env.VERSION;
            fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
          "

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install
        env:
          OPENHARNESS_SKIP_PI_BUILD: "1"

      - name: Build Pi submodule
        run: pnpm run build:pi

      - name: Build workspace packages
        run: pnpm --filter @openharness/pi-rpc build

      - name: Build and publish desktop app
        run: pnpm --filter desktop dist:publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
