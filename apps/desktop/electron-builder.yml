appId: com.openharness.desktop
productName: OpenHarness
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
asar: true
publish:
  provider: github
  owner: simonepriuli
  repo: openharness
generateUpdatesFilesForAllChannels: true
extraResources:
  - from: resources/pi-runtime
    to: pi
    filter:
      - "**/*"
mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  extendInfo:
    CFBundleDisplayName: OpenHarness
    CFBundleName: OpenHarness
  # When code signing, also set hardenedRuntime and entitlements — see docs/RELEASING.md
linux:
  target:
    - AppImage
win:
  target:
    - nsis
