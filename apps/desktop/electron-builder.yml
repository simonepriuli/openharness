appId: com.openharness.desktop
productName: OpenHarness
protocols:
  - name: OpenHarness Auth
    schemes:
      - com.openharness.desktop
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
asar: true
publish:
  provider: github
  owner: simonepriuli
  repo: openharness
  releaseType: release
generateUpdatesFilesForAllChannels: true
extraResources:
  - from: resources/node-runtime
    to: node
    filter:
      - "**/*"
  - from: resources/pi-runtime
    to: pi
    filter:
      - "**/*"
      - "!node_modules/**"
  # electron-builder excludes **/node_modules/** by default; copy deps separately.
  - from: resources/pi-runtime/node_modules
    to: pi/node_modules
mac:
  icon: build/icon.icns
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  extendInfo:
    CFBundleDisplayName: OpenHarness
    CFBundleName: OpenHarness
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
linux:
  icon: build/icons
  target:
    - AppImage
win:
  target:
    - nsis
