name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v6
        with:
          version: 10.11.0

      - uses: actions/setup-node@v6
        with:
          node-version: "22.19.0"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install
        env:
          OPENHARNESS_SKIP_PI_BUILD: "1"

      - name: Build Pi submodule
        run: pnpm run build:pi

      - name: Typecheck and test
        run: |
          pnpm --filter @openharness/db build
          pnpm run typecheck
          pnpm --filter @openharness/pi-rpc test
          node --test scripts/compute-cloud-worker-fingerprint.test.mjs
