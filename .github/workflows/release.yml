# Release desktop builds to GitHub Releases.
#
# Usage:
#   git tag v1.0.0
#   git push origin v1.0.0
#
# Each platform runner uploads installers and latest*.yml metadata.
# Installed apps use electron-updater to fetch updates from the release.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          export VERSION
          node -e "
            const fs = require('fs');
            const path = 'apps/desktop/package.json';
            const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
            pkg.version = process.env.VERSION;
            fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
          "

      - uses: pnpm/action-setup@v6
        with:
          version: 10.11.0

      - uses: actions/setup-node@v6
        with:
          node-version: "22.19.0"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install
        env:
          OPENHARNESS_SKIP_PI_BUILD: "1"

      - name: Build Pi submodule
        run: pnpm run build:pi

      - name: Build workspace packages
        run: pnpm --filter @openharness/pi-rpc build

      - name: Verify pi-rpc build output
        run: test -f packages/pi-rpc/dist/index.js

      - name: Build and publish desktop app
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK_RAW: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD_RAW: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID_RAW: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD_RAW: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID_RAW: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # GitHub Actions passes missing secrets as empty strings. electron-builder
          # treats an empty CSC_LINK as a certificate file path and fails.
          if [[ -n "${CSC_LINK_RAW:-}" ]]; then
            echo "Signing certificate present; building signed release."
            export CSC_LINK="$CSC_LINK_RAW"
            export CSC_KEY_PASSWORD="$CSC_KEY_PASSWORD_RAW"
            export APPLE_ID="$APPLE_ID_RAW"
            export APPLE_APP_SPECIFIC_PASSWORD="$APPLE_APP_SPECIFIC_PASSWORD_RAW"
            export APPLE_TEAM_ID="$APPLE_TEAM_ID_RAW"
          else
            echo "No signing certificate; building unsigned release."
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          pnpm --filter desktop dist:publish

      - name: Verify macOS update metadata
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          URL="https://github.com/simonepriuli/openharness/releases/download/v${VERSION}/latest-mac.yml"
          echo "Checking $URL"
          YML="$(curl -fsSL "$URL")"
          echo "$YML" | head -10
          ZIP_PATH="$(echo "$YML" | awk '/^path:/{print $2}')"
          test -n "$ZIP_PATH"
          curl -fsSL -o /dev/null "https://github.com/simonepriuli/openharness/releases/download/v${VERSION}/${ZIP_PATH}"
